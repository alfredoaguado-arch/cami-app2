<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="round">
      <rect width="512" height="512" rx="90" ry="90"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" ry="90" fill="#1A1A18"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="512" height="30" rx="0" fill="#D3D1C7" clip-path="url(#round)"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="482" width="512" height="30" fill="#D3D1C7" clip-path="url(#round)"/>
  <!-- Left accent -->
  <rect x="0" y="0" width="22" height="512" fill="#D3D1C7" clip-path="url(#round)"/>
  <!-- Right accent -->
  <rect x="490" y="0" width="22" height="512" fill="#D3D1C7" clip-path="url(#round)"/>
  <!-- CAMI text -->
  <text x="256" y="290"
    font-family="'Courier New', Courier, monospace"
    font-size="180"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="8">CAMI</text>
  <!-- Subtitle -->
  <text x="256" y="380"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="400"
    fill="#888780"
    text-anchor="middle"
    letter-spacing="6">ACEROS MFG</text>
</svg>
